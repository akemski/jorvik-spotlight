<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club — Jorvik Spotlight</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #150d12; color: #fff0f4; }
    .hero-banner { width: 100%; height: 220px; background: #150d12; position: relative; overflow: hidden; }
    .banner-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .club-page { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; }
    .club-header { display: flex; align-items: flex-end; gap: 1.5rem; margin-top: -36px; margin-bottom: 2.5rem; position: relative; z-index: 2; }
    .club-avatar-lg { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; flex-shrink: 0; border: 3px solid #150d12; }
    .club-header-info { flex: 1; padding-bottom: 4px; }
    .club-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .club-name-lg { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700; color: #ffffff; }
    .club-meta-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .club-meta-item { font-size: 14px; font-weight: 400; color: rgba(255,190,205,0.5); }
    .badge-v { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: rgba(100,180,140,0.12); border: 0.5px solid rgba(100,200,160,0.35); color: #7dd4b0; }
    .badge-v-dot { width: 5px; height: 5px; border-radius: 50%; background: #7dd4b0; }
    .badge-c { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: rgba(220,50,90,0.15); border: 0.5px solid rgba(255,100,150,0.3); color: rgba(255,160,190,0.8); }
    .badge-s { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
    .content-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: start; }
    .card-dark { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .card-title-dark { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #ff9ab8; margin-bottom: 0.85rem; padding-bottom: 0.65rem; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .card-text-dark { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.75; }
    .info-list-dark { display: flex; flex-direction: column; gap: 8px; }
    .info-row-dark { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; border-bottom: 0.5px solid rgba(255,255,255,0.06); padding-bottom: 8px; }
    .info-row-dark:last-child { border-bottom: none; padding-bottom: 0; }
    .info-label-dark { font-size: 13px; font-weight: 400; color: rgba(255,160,190,0.6); flex-shrink: 0; }
    .info-value-dark { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); text-align: right; }
    .insider-card { background: rgba(220,50,90,0.08); border: 0.5px solid rgba(255,100,150,0.3); border-left: 3px solid #ff4d80; border-radius: 6px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .insider-tag { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #ff9ab8; margin-bottom: 0.85rem; padding-bottom: 0.65rem; border-bottom: 0.5px solid rgba(255,100,150,0.15); }
    .insider-tag-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff9ab8; flex-shrink: 0; }
    .insider-author { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .insider-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(220,50,90,0.3); color: #ffb8cc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .insider-name { font-size: 14px; font-weight: 600; color: rgba(255,200,215,0.8); }
    .insider-date { font-size: 13px; font-weight: 400; color: rgba(255,160,190,0.45); }
    .insider-text { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.65); line-height: 1.75; font-style: italic; }
    .spotlight-teaser { background: rgba(220,50,90,0.08); border: 0.5px solid rgba(255,100,150,0.3); border-radius: 6px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .spotlight-teaser-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #ff9ab8; margin-bottom: 6px; }
    .spotlight-teaser-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
    .spotlight-teaser-text { font-size: 14px; font-weight: 400; color: rgba(255,200,215,0.55); line-height: 1.6; margin-bottom: 10px; }
    .sp-link-pink { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #ff5588; text-decoration: none; }
    .sp-link-pink:hover { color: #ff9ab8; }
    .instagram-link { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 6px; margin-top: 1rem; transition: background 0.15s; text-decoration: none; }
    .instagram-link:hover { background: rgba(255,255,255,0.1); }
    .instagram-text { font-size: 14px; font-weight: 600; color: #ffffff; }
    .not-found { text-align: center; padding: 6rem 2rem; font-family: 'Cinzel', serif; font-size: 24px; color: rgba(255,160,190,0.5); }
    @media (max-width: 700px) { .content-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav class="nav" style="justify-content:space-between;">
    <div class="nav-logo" style="position:static;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#ff9ab8;letter-spacing:0.08em;">Jorvik Spotlight</div>
    <div class="nav-links" style="gap:2.5rem;">
      <a href="index.html">Clubs</a>
      <a href="spotlight.html">Spotlight</a>
      <a href="about.html">About</a>
    </div>
    <a href="index.html" class="nav-cta" style="position:static;border-radius:30px;background:rgba(220,70,110,0.25);border:0.5px solid rgba(240,120,160,0.6);color:#ff9ab8;">← Back to directory</a>
  </nav>

  <div class="hero-banner">
    <svg class="banner-svg" viewBox="0 0 900 220" preserveAspectRatio="xMidYMid slice">
      <circle cx="100" cy="80" r="120" fill="rgba(220,50,90,0.18)"/>
      <circle cx="750" cy="160" r="140" fill="rgba(180,40,120,0.12)"/>
      <circle cx="60" cy="40" r="1.5" fill="rgba(255,160,190,0.6)"/>
      <circle cx="380" cy="60" r="1.5" fill="rgba(255,160,190,0.4)"/>
      <circle cx="720" cy="50" r="1.5" fill="rgba(255,160,190,0.35)"/>
    </svg>
  </div>

  <div id="clubContent" class="club-page"></div>

  <footer style="padding:2rem 2.5rem 0;border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:1.5rem;">
      <div style="font-family:'Cinzel',serif;font-size:15px;color:rgba(255,160,190,0.5);letter-spacing:0.08em;">Jorvik Spotlight</div>
      <div style="display:flex;gap:1.5rem;">
        <a href="#" style="font-size:13px;color:rgba(255,160,190,0.4);text-decoration:none;">Instagram</a>
        <a href="about.html" style="font-size:13px;color:rgba(255,160,190,0.4);text-decoration:none;">Contact</a>
        <a href="about.html" style="font-size:13px;color:rgba(255,160,190,0.4);text-decoration:none;">About</a>
      </div>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:64px;font-weight:900;color:rgba(220,50,90,0.07);letter-spacing:0.05em;text-align:center;padding:1rem 0 0;border-top:1px solid rgba(255,255,255,0.07);user-select:none;">JORVIK SPOTLIGHT</div>
  </footer>

  <script src="clubs.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const club = getClub(id);
    const container = document.getElementById('clubContent');

    if (!club) {
      container.innerHTML = '<div class="not-found">Club not found.</div>';
    } else {
      document.title = `${club.name} — Jorvik Spotlight`;

      const spotlightData = club.spotlight ? getSpotlight(club.spotlight) : null;

      container.innerHTML = `
        <div class="club-header">
          ${avatarHTML(club, "72px", "border:3px solid #150d12;")}
          <div class="club-header-info">
            <div class="club-name-row">
              <div class="club-name-lg">${club.name}</div>
              ${club.visit ? '<span class="badge-v"><span class="badge-v-dot"></span>Visited</span>' : ''}
              <span class="badge-c">${club.categoryLabel}</span>
              <span class="badge-s">${club.server}</span>
            </div>
            <div class="club-meta-row">
              <span class="club-meta-item">Founded ${club.founded}</span>
              <span class="club-meta-item">·</span>
              <span class="club-meta-item">${club.members} members</span>
              <span class="club-meta-item">·</span>
              <span class="club-meta-item">${club.meetingTimes}</span>
            </div>
          </div>
        </div>

        <div class="content-grid">
          <div>
            <div class="card-dark">
              <div class="card-title-dark">About this club</div>
              <div class="card-text-dark">${club.description}</div>
            </div>
            <div class="card-dark">
              <div class="card-title-dark">Requirements to join</div>
              <div class="card-text-dark">${club.requirements}</div>
            </div>
            ${club.visit ? `
            <div class="insider-card">
              <div class="insider-tag"><span class="insider-tag-dot"></span>Personal experience — visited this club</div>
              <div class="insider-author">
                <div class="insider-avatar">JS</div>
                <div>
                  <div class="insider-name">Jorvik Spotlight</div>
                  <div class="insider-date">${club.visit.date} · ${club.visit.meetingsAttended} meeting${club.visit.meetingsAttended > 1 ? 's' : ''} visited</div>
                </div>
              </div>
              <div class="insider-text">${club.visit.report}</div>
            </div>` : ''}
            ${spotlightData ? `
            <div class="spotlight-teaser">
              <div class="spotlight-teaser-tag">Spotlight · ${spotlightData.month}</div>
              <div class="spotlight-teaser-title">${spotlightData.whyLabel}</div>
              <div class="spotlight-teaser-text">This club was chosen as our spotlight — read the full article to find out why.</div>
              <a class="sp-link-pink" href="spotlight.html?id=${spotlightData.id}">Read full spotlight →</a>
            </div>` : ''}
          </div>
          <div>
            <div class="card-dark">
              <div class="card-title-dark">Club info</div>
              <div class="info-list-dark">
                <div class="info-row-dark"><span class="info-label-dark">Category</span><span class="info-value-dark">${club.categoryLabel}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Server</span><span class="info-value-dark">${club.server}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Founded</span><span class="info-value-dark">${club.founded}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Members</span><span class="info-value-dark">${club.members}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Meeting times</span><span class="info-value-dark">${club.meetingTimes}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Language</span><span class="info-value-dark">${club.language}</span></div>
              </div>
              ${club.instagram ? `
              <a class="instagram-link" href="${club.instagramUrl}" target="_blank">
                <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="3.5" fill="none" stroke="#ffffff" stroke-width="1"/><circle cx="8" cy="8" r="2.8" fill="none" stroke="#ffffff" stroke-width="1"/><circle cx="11.5" cy="4.5" r="0.9" fill="#ffffff"/></svg>
                <span class="instagram-text">${club.instagram}</span>
              </a>` : ''}
            </div>
            <div class="card-dark">
              <div class="card-title-dark">Status</div>
              <div class="info-list-dark">
                <div class="info-row-dark"><span class="info-label-dark">In directory</span><span class="info-value-dark" style="color:#7dd4b0;">Yes</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Personally visited</span><span class="info-value-dark" style="color:${club.visit ? '#7dd4b0' : 'rgba(255,160,190,0.4)'};">${club.visit ? `Yes · ${club.visit.date}` : 'Not yet'}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Spotlight</span><span class="info-value-dark" style="color:${spotlightData ? '#ff9ab8' : 'rgba(255,160,190,0.4)'};">${spotlightData ? spotlightData.month : '—'}</span></div>
                <div class="info-row-dark"><span class="info-label-dark">Accepting members</span><span class="info-value-dark" style="color:${club.acceptingMembers ? '#7dd4b0' : 'rgba(255,160,190,0.4)'};">${club.acceptingMembers ? 'Yes' : 'No'}</span></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
